<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>点餐小程序 · 私享版</title>
    <style>
        :root {
            --bg: #F5F0EB;
            --card-bg: #FFFFFF;
            --primary: #E8833A;
            --primary-dark: #C96E2A;
            --text: #2D2D2D;
            --text-secondary: #8E8E8E;
            --border: #EDEDED;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
            --radius-md: 14px;
            --radius-lg: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #EDE8E3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .phone-frame {
            width: 100%;
            max-width: 420px;
            height: 92vh;
            max-height: 880px;
            min-height: 640px;
            background: var(--bg);
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 0 3px #1a1a1a, 0 0 0 7px #2d2d2d, 0 0 0 9px #1a1a1a, 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
        }
        .status-bar {
            background: #fff;
            padding: 12px 20px 8px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .app-header {
            background: #fff;
            padding: 8px 20px 14px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .app-header .title { font-size: 18px; font-weight:700; }
        .category-tabs {
            display: flex;
            gap: 8px;
            padding: 12px 16px 8px;
            background: var(--bg);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .category-tab {
            flex-shrink: 0;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 14px;
            font-weight:600;
            background: #fff;
            color: var(--text-secondary);
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .category-tab.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(232,131,58,0.3);
        }
        .product-scroll-area {
            flex:1;
            overflow-y: auto;
            padding: 8px 12px 100px;
        }
        .product-card {
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: var(--radius-md);
            padding: 14px;
            margin-bottom: 10px;
            gap: 12px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: 0.15s;
        }
        .product-card:active { transform: scale(0.98); }
        .product-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: #F9F6F2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .product-info { flex:1; }
        .product-name { font-size: 15px; font-weight:600; color: var(--text); }
        .product-price { font-size: 16px; font-weight:700; color: var(--primary); }
        .product-price.placeholder { color:#D0CBC6; font-size:13px; font-style:italic; }
        .qty-controller { display:flex; align-items:center; gap:8px; }
        .qty-btn {
            width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid var(--border); background: #fff;
            font-size: 18px; font-weight:600; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .cart-bar {
            position: absolute;
            bottom: 0; left:0; right:0;
            background: #2D2D2D;
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 12px;
            border-radius: 20px 20px 0 0;
            color: #fff;
            cursor: pointer;
            z-index: 20;
        }
        .cart-icon { position:relative; font-size:24px; }
        .cart-badge {
            position: absolute; top:-6px; right:-8px;
            background: #E8553D; color:#fff; border-radius:10px;
            padding:0 6px; font-size:11px; font-weight:700;
        }
        .cart-total { font-size:18px; font-weight:700; }
        .cart-overlay {
            position: absolute; inset:0;
            background: rgba(0,0,0,0.5); z-index:30;
            opacity:0; pointer-events:none; transition:0.3s;
        }
        .cart-overlay.visible { opacity:1; pointer-events:auto; }
        .cart-panel {
            position: absolute; bottom:0; left:0; right:0;
            background: #fff; z-index:35;
            border-radius: 22px 22px 0 0;
            transform: translateY(100%);
            transition: 0.3s;
            max-height: 65%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.2);
        }
        .cart-panel.visible { transform: translateY(0); }
        .cart-panel-header {
            display: flex; justify-content: space-between;
            padding: 16px 18px 10px; border-bottom: 1px solid var(--border);
        }
        .cart-panel-list { flex:1; overflow-y: auto; padding: 6px 16px; min-height:80px; }
        .cart-item-row {
            display: flex; align-items: center; gap:10px;
            padding: 10px 0; border-bottom: 1px solid #f8f5f2;
        }
        .cart-item-name { flex:1; font-weight:600; }
        .cart-panel-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 18px 18px; border-top: 1px solid var(--border);
        }
        .cart-panel-confirm {
            background: var(--primary); color:#fff; border:none;
            padding: 12px 28px; border-radius: 22px; font-size:15px; font-weight:700;
            cursor: pointer;
        }
        .toast {
            position: absolute; top:50%; left:50%; transform: translate(-50%,-50%);
            background: rgba(0,0,0,0.8); color:#fff; padding: 12px 22px;
            border-radius: 22px; z-index:50; opacity:0; transition:0.3s;
            pointer-events: none;
        }
        .toast.show { opacity:1; }
    </style>
</head>
<body>

<div class="phone-frame" id="phoneFrame">
    <div class="status-bar">
        <span>9:41</span><span>📶 🔋</span>
    </div>
    <div class="app-header">
        <div class="title">🍽️ 随心点</div>
        <div style="font-size:12px; color:#8E8E8E;">零食 · 饮料 · 奶茶</div>
    </div>

    <div class="category-tabs" id="categoryTabs"></div>
    <div class="product-scroll-area" id="productScrollArea"></div>

    <div class="cart-bar" id="cartBar">
        <div class="cart-icon" id="cartIconWrap">🛒<span class="cart-badge" id="cartBadge" style="display:none;">0</span></div>
        <div style="flex:1;">
            <div class="cart-total" id="cartBarTotal">¥ --</div>
            <div style="font-size:11px; color:#AAA;" id="cartBarHint">点击查看详情</div>
        </div>
        <button id="cartBarAction" style="background:#4A4A4A; color:#999; border:none; padding:10px 20px; border-radius:22px; font-weight:600;" disabled>去结算</button>
    </div>

    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-panel" id="cartPanel">
        <div class="cart-panel-header">
            <span style="font-weight:700; font-size:17px;">🛒 购物车</span>
            <button id="cartPanelClear" style="background:#FFF5F3; color:#E8553D; border:none; padding:6px 14px; border-radius:16px; cursor:pointer;">清空</button>
        </div>
        <div class="cart-panel-list" id="cartPanelList"></div>
        <div class="cart-panel-footer">
            <div>
                <div style="font-size:12px; color:#8E8E8E;">合计</div>
                <div style="font-size:22px; font-weight:700;" id="cartPanelTotal">¥ --</div>
            </div>
            <button class="cart-panel-confirm" id="cartPanelConfirm" disabled>确认下单</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>
</div>

<script>
    (function() {
        // ⚠️ 你的 PushPlus Token（已填入）
        const PUSHPLUS_TOKEN = 'ae92efc024264199816d77e8f4d579dc';

        // ========== 商品数据（已修正标点） ==========
        const productData = {
            '零食': [
                { id: 's1', name: '乐事薯片', price: 4, icon: '🍿' },
                { id: 's2', name: '海苔', price: 3, icon: '🌿' },
                { id: 's3', name: '旺旺雪饼(小包)', price: 2, icon: '❄️🍘' },
                { id: 's4', name: '趣多多曲奇', price: 7, icon: '🍪' },
                { id: 's5', name: '卫龙小面筋', price: 1.5, icon: '🌶️' },
                { id: 's6', name: '魔芋素毛肚', price: 2, icon: '🌶️🫧' },
                { id: 's7', name: '话梅粒(小包)', price: 3, icon: '🍒' },
                { id: 's8', name: '德芙巧克力(小块)', price: 2, icon: '🍫' },
                { id: 's9', name: '小蛋糕', price: 15, icon: '🧁' },
                { id: 's10', name: '卷粉', price: 6, icon: '🍜' },
                { id: 's11', name: '奶糖', price: 3, icon: '🍬' },
                { id: 's12', name: '火鸡面', price: 6, icon: '🍜🌶️' }
            ],
            '饮料': [
                { id: 'd1', name: '可乐（罐装）', price: 2.5, icon: '🥤' },
                { id: 'd2', name: '雪碧（罐装）', price: 2.5, icon: '🧃' },
                { id: 'd3', name: '果粒橙（500ml）', price: 3.5, icon: '🍊' },
                { id: 'd4', name: '农夫山泉', price: 2, icon: '💧' }
            ],
            '奶茶': [
                { id: 't1', name: '豆乳米麻薯', price: 16, icon: '🥛🍡' },
                { id: 't2', name: '茉莉奶绿', price: 9, icon: '🍵🌸' },
                { id: 't3', name: '西瓜啵啵', price: 15, icon: '🍉🧋' },
                { id: 't4', name: '云岭茉莉', price: 11, icon: '🍵🌸' },
                { id: 't5', name: '四季青山', price: 12, icon: '🍵' }
            ]
        };

        const categories = Object.keys(productData);
        const cart = new Map(); // productId → quantity

        const cartManager = {
            add(id, d=1) {
                const q = (cart.get(id)||0) + d;
                q <= 0 ? cart.delete(id) : cart.set(id, q);
                this._notify();
            },
            set(id, q) {
                q <= 0 ? cart.delete(id) : cart.set(id, q);
                this._notify();
            },
            clear() { cart.clear(); this._notify(); },
            getQty(id) { return cart.get(id)||0; },
            getTotalItems() { let t=0; cart.forEach(v => t+=v); return t; },
            isEmpty() { return cart.size === 0; },
            getTotalPrice() {
                let t=0;
                cart.forEach((q, id) => {
                    const p = this._find(id);
                    if(p && p.price>0) t += p.price * q;
                });
                return t;
            },
            getDetails() {
                const arr = [];
                cart.forEach((q, id) => {
                    const p = this._find(id);
                    if(p) arr.push({...p, quantity: q, subtotal: p.price>0 ? p.price*q : 0, hasPrice: p.price>0});
                });
                return arr;
            },
            _find(id) {
                for(let cat of categories) {
                    const f = productData[cat].find(x => x.id===id);
                    if(f) return f;
                }
                return null;
            },
            _notify() { if(this._listener) this._listener(); },
            onChange(fn) { this._listener = fn; }
        };

        const DOM = {
            categoryTabs: document.getElementById('categoryTabs'),
            productArea: document.getElementById('productScrollArea'),
            cartBar: document.getElementById('cartBar'),
            cartIconWrap: document.getElementById('cartIconWrap'),
            cartBadge: document.getElementById('cartBadge'),
            cartBarTotal: document.getElementById('cartBarTotal'),
            cartBarHint: document.getElementById('cartBarHint'),
            cartBarAction: document.getElementById('cartBarAction'),
            cartOverlay: document.getElementById('cartOverlay'),
            cartPanel: document.getElementById('cartPanel'),
            cartPanelList: document.getElementById('cartPanelList'),
            cartPanelTotal: document.getElementById('cartPanelTotal'),
            cartPanelClear: document.getElementById('cartPanelClear'),
            cartPanelConfirm: document.getElementById('cartPanelConfirm'),
            toast: document.getElementById('toast'),
        };

        let currentCategory = '零食';

        function showToast(msg) {
            DOM.toast.textContent = msg;
            DOM.toast.classList.add('show');
            setTimeout(() => DOM.toast.classList.remove('show'), 1800);
        }

        function formatPrice(p) { return p > 0 ? '¥' + p.toFixed(2) : null; }

        function renderTabs() {
            DOM.categoryTabs.innerHTML = categories.map(cat =>
                `<button class="category-tab ${cat===currentCategory?'active':''}" data-cat="${cat}">${cat}</button>`
            ).join('');
        }

        function renderProducts() {
            const products = productData[currentCategory] || [];
            DOM.productArea.innerHTML = products.map(p => {
                const qty = cartManager.getQty(p.id);
                const priceStr = formatPrice(p.price);
                return `
                <div class="product-card" data-id="${p.id}">
                    <div class="product-icon">${p.icon}</div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price ${priceStr?'':'placeholder'}">${priceStr||'¥ --'}</div>
                    </div>
                    <div class="qty-controller">
                        ${qty>0 ? `<button class="qty-btn" data-action="minus">−</button><span class="qty-num">${qty}</span>` : ''}
                        <button class="qty-btn" data-action="plus">+</button>
                    </div>
                </div>`;
            }).join('');
            // 事件绑定
            DOM.productArea.querySelectorAll('.qty-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    const card = btn.closest('.product-card');
                    const id = card.dataset.id;
                    if(btn.dataset.action==='plus') cartManager.add(id, 1);
                    else cartManager.add(id, -1);
                });
            });
            DOM.productArea.querySelectorAll('.product-card').forEach(card => {
                card.addEventListener('click', e => {
                    if(e.target.closest('.qty-btn')) return;
                    cartManager.add(card.dataset.id, 1);
                });
            });
        }

        function updateCartBar() {
            const items = cartManager.getTotalItems();
            const total = cartManager.getTotalPrice();
            const isEmpty = cartManager.isEmpty();
            const allSet = !isEmpty && cartManager.getDetails().every(x => x.hasPrice);

            DOM.cartBadge.style.display = isEmpty ? 'none' : 'flex';
            DOM.cartBadge.textContent = items > 99 ? '99+' : items;
            DOM.cartIconWrap.style.color = isEmpty ? '#aaa' : '#fff';

            if(isEmpty) {
                DOM.cartBarTotal.textContent = '¥ --';
                DOM.cartBarTotal.style.color = '#888';
                DOM.cartBarHint.textContent = '购物车是空的';
                DOM.cartBarAction.disabled = true;
                DOM.cartBarAction.style.background = '#4A4A4A';
                DOM.cartBarAction.style.color = '#999';
            } else {
                DOM.cartBarTotal.textContent = allSet ? `¥${total.toFixed(2)}` : '¥ --';
                DOM.cartBarTotal.style.color = allSet ? '#fff' : '#888';
                DOM.cartBarHint.textContent = `已选 ${items} 件`;
                DOM.cartBarAction.disabled = false;
                DOM.cartBarAction.style.background = '#E8833A';
                DOM.cartBarAction.style.color = '#fff';
            }
        }

        function updateCartPanel() {
            const details = cartManager.getDetails();
            const isEmpty = details.length === 0;
            const total = cartManager.getTotalPrice();
            const allSet = !isEmpty && details.every(x => x.hasPrice);

            if(isEmpty) {
                DOM.cartPanelList.innerHTML = `<div style="text-align:center; padding:30px; color:#C5C0BB;">🛒 空空如也</div>`;
            } else {
                DOM.cartPanelList.innerHTML = details.map(item => `
                    <div class="cart-item-row">
                        <div class="product-icon" style="font-size:22px;">${item.icon}</div>
                        <div class="cart-item-name">${item.name}</div>
                        <div style="font-size:12px; color:#8E8E8E;">×${item.quantity}</div>
                        <div style="font-weight:700; color:${item.hasPrice?'#E8833A':'#D0CBC6'};">
                            ${item.hasPrice ? '¥'+item.subtotal.toFixed(2) : '¥ --'}
                        </div>
                    </div>
                `).join('');
            }
            DOM.cartPanelTotal.textContent = isEmpty ? '¥ --' : (allSet ? `¥${total.toFixed(2)}` : '¥ --');
            DOM.cartPanelConfirm.disabled = isEmpty;
        }

        function openCart() {
            updateCartPanel();
            DOM.cartOverlay.classList.add('visible');
            DOM.cartPanel.classList.add('visible');
        }
        function closeCart() {
            DOM.cartOverlay.classList.remove('visible');
            DOM.cartPanel.classList.remove('visible');
        }

        // 发送推送
        async function sendOrderToPushPlus(orderText) {
            if (!PUSHPLUS_TOKEN || PUSHPLUS_TOKEN === 'ae92efc024264199816d77e8f4d579dc') {
                // 这里其实永远为真，但为了代码清晰保留，可以删除此判断
                console.warn('Token 已就绪');
            }
            try {
                const res = await fetch('https://www.pushplus.plus/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: PUSHPLUS_TOKEN,
                        title: '🛎️ 新订单来啦！',
                        content: orderText,
                        template: 'txt'
                    })
                });
                const data = await res.json();
                if (data.code === 200) {
                    showToast('✅ 下单成功，已通知他～');
                    return true;
                } else {
                    showToast('⚠️ 推送失败：' + (data.msg || '未知错误'));
                    return false;
                }
            } catch(e) {
                showToast('⚠️ 网络错误，推送未发送');
                return false;
            }
        }

        // 确认下单
        async function handleOrderConfirm() {
            if (cartManager.isEmpty()) return;
            const details = cartManager.getDetails();
            const total = cartManager.getTotalPrice();
            const allSet = details.every(x => x.hasPrice);
            let orderText = '【订单详情】\n';
            details.forEach((item, idx) => {
                orderText += `${idx+1}. ${item.name} ×${item.quantity}`;
                if(item.hasPrice) orderText += `  (单价¥${item.price}，小计¥${item.subtotal.toFixed(2)})`;
                orderText += '\n';
            });
            if(allSet) orderText += `\n💰 总计：¥${total.toFixed(2)}`;
            else orderText += '\n⚠️ 部分商品价格未设定';

            const success = await sendOrderToPushPlus(orderText);
            if (success) {
                cartManager.clear();
                closeCart();
            }
        }

        // 初始化事件
        DOM.categoryTabs.addEventListener('click', e => {
            const tab = e.target.closest('.category-tab');
            if(!tab) return;
            currentCategory = tab.dataset.cat;
            renderTabs();
            renderProducts();
        });

        DOM.cartBar.addEventListener('click', () => {
            openCart();
        });
        DOM.cartBarAction.addEventListener('click', (e) => {
            e.stopPropagation();
            openCart();
        });

        DOM.cartOverlay.addEventListener('click', closeCart);
        DOM.cartPanelClear.addEventListener('click', () => { cartManager.clear(); showToast('已清空'); });
        DOM.cartPanelConfirm.addEventListener('click', handleOrderConfirm);

        cartManager.onChange(() => {
            renderProducts();
            updateCartBar();
            if(DOM.cartPanel.classList.contains('visible')) updateCartPanel();
        });

        // 启动
        renderTabs();
        renderProducts();
        updateCartBar();
    })();
</script>
</body>
</html>
